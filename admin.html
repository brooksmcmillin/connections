<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Settings - Button Colors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FFF5E9;
            --warm-white: #FFFCF7;
            --text-dark: #4A3728;
            --text-soft: #8B7355;
            --coral: #FF6B6B;
            --sky: #5BB5E8;
            --sky-dark: #3A94C8;
            --border-warm: #F0E6D8;
            --shadow-warm: rgba(180, 140, 100, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--cream);
            margin: 0;
            padding: 10px;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(210, 170, 130, 0.12) 1.2px, transparent 1.2px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .admin-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Lilita One', cursive;
            color: var(--coral);
            font-size: 2em;
            margin-bottom: 4px;
            text-shadow: 3px 3px 0 rgba(74, 55, 40, 0.08);
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-soft);
            font-size: 1.1em;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .settings-panel {
            background: rgba(255, 255, 255, 0.55);
            border-radius: 24px;
            border: 3px dashed rgba(200, 170, 140, 0.3);
            box-shadow: 0 8px 30px rgba(180, 140, 100, 0.08);
            padding: 28px;
            margin: 20px 0;
        }

        .color-setting {
            margin: 20px 0;
            padding: 18px;
            background: var(--warm-white);
            border: 2px solid var(--border-warm);
            border-bottom: 4px solid #E8D5C0;
            border-radius: 16px;
        }

        .color-setting label {
            display: block;
            color: var(--text-dark);
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .color-input-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="color"] {
            width: 72px;
            height: 72px;
            border: 3px solid var(--border-warm);
            border-radius: 14px;
            cursor: pointer;
            background: none;
            padding: 4px;
        }

        input[type="text"] {
            width: 120px;
            padding: 10px 14px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1em;
            font-weight: 500;
            border: 2px solid var(--border-warm);
            border-radius: 12px;
            background: white;
            color: var(--text-dark);
            text-align: center;
        }

        .preview-section {
            margin: 24px 0 0;
            padding: 20px;
            background: var(--warm-white);
            border: 2px solid var(--border-warm);
            border-bottom: 4px solid #E8D5C0;
            border-radius: 16px;
        }

        .preview-section h3 {
            color: var(--text-dark);
            font-size: 1.2em;
            font-weight: 600;
            margin: 0 0 16px;
        }

        .preview-button {
            font-family: 'Fredoka', sans-serif;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 50px;
            margin: 8px;
            letter-spacing: 0.3px;
        }

        .action-buttons {
            margin: 28px 0;
        }

        .btn {
            font-family: 'Fredoka', sans-serif;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 0.3px;
        }

        .btn-back {
            background: var(--sky);
            box-shadow: 0 6px 0 var(--sky-dark), 0 8px 16px rgba(91, 181, 232, 0.25);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 var(--sky-dark), 0 12px 20px rgba(91, 181, 232, 0.3);
        }

        .btn-back:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--sky-dark), 0 4px 8px rgba(91, 181, 232, 0.15);
        }

        .message {
            color: #2DAA6E;
            font-size: 1.15em;
            font-weight: 600;
            margin: 14px 0;
            min-height: 28px;
        }

        @media (max-width: 768px) {
            .admin-container { padding: 10px; }
            h1 { font-size: 1.5em; }
            .settings-panel { padding: 18px 14px; }

            input[type="color"] {
                width: 56px;
                height: 56px;
            }

            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>⚙️ Admin Settings ⚙️</h1>
        <p class="subtitle">Customize Button Colors</p>

        <div class="settings-panel">
            <div class="color-setting">
                <label>Make a Group Button ✨</label>
                <div class="color-input-group">
                    <input type="color" id="groupBtnColor" value="#ff0000">
                    <input type="text" id="groupBtnText" value="#ff0000" readonly>
                </div>
            </div>

            <div class="color-setting">
                <label>Clear Selection Button</label>
                <div class="color-input-group">
                    <input type="color" id="clearBtnColor" value="#FF9800">
                    <input type="text" id="clearBtnText" value="#FF9800" readonly>
                </div>
            </div>

            <div class="color-setting">
                <label>New Game Button 🎮</label>
                <div class="color-input-group">
                    <input type="color" id="newGameBtnColor" value="#0000ff">
                    <input type="text" id="newGameBtnText" value="#0000ff" readonly>
                </div>
            </div>

            <div class="preview-section">
                <h3>Button Preview</h3>
                <div>
                    <button class="preview-button" id="previewGroupBtn">Make a Group! ✨</button>
                </div>
                <div>
                    <button class="preview-button" id="previewClearBtn">Clear Selection</button>
                </div>
                <div>
                    <button class="preview-button" id="previewNewGameBtn">🎮 New Game 🎮</button>
                </div>
            </div>
        </div>

        <div class="message" id="message"></div>

        <div class="action-buttons">
            <a href="index.html" class="btn btn-back">⬅️ Back to Game</a>
        </div>
    </div>

    <script>
        const defaultColors = {
            groupBtn: '#ff0000',
            clearBtn: '#FF9800',
            newGameBtn: '#0000ff'
        };

        function loadColors() {
            const savedColors = localStorage.getItem('buttonColors');
            let colors = defaultColors;

            if (savedColors) {
                try {
                    colors = JSON.parse(savedColors);
                } catch (e) {
                    console.error('Error loading colors:', e);
                }
            }

            document.getElementById('groupBtnColor').value = colors.groupBtn;
            document.getElementById('groupBtnText').value = colors.groupBtn;
            document.getElementById('clearBtnColor').value = colors.clearBtn;
            document.getElementById('clearBtnText').value = colors.clearBtn;
            document.getElementById('newGameBtnColor').value = colors.newGameBtn;
            document.getElementById('newGameBtnText').value = colors.newGameBtn;

            updatePreviews();
        }

        function updatePreviews() {
            const groupColor = document.getElementById('groupBtnColor').value;
            const clearColor = document.getElementById('clearBtnColor').value;
            const newGameColor = document.getElementById('newGameBtnColor').value;

            document.getElementById('previewGroupBtn').style.background = groupColor;
            document.getElementById('previewClearBtn').style.background = clearColor;
            document.getElementById('previewNewGameBtn').style.background = newGameColor;
        }

        function saveColors() {
            const colors = {
                groupBtn: document.getElementById('groupBtnColor').value,
                clearBtn: document.getElementById('clearBtnColor').value,
                newGameBtn: document.getElementById('newGameBtnColor').value
            };

            localStorage.setItem('buttonColors', JSON.stringify(colors));
            showMessage('Color saved!');
        }

        function showMessage(text) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            setTimeout(() => { messageEl.textContent = ''; }, 3000);
        }

        document.getElementById('groupBtnColor').addEventListener('input', function(e) {
            document.getElementById('groupBtnText').value = e.target.value;
            updatePreviews();
        });
        document.getElementById('groupBtnColor').addEventListener('change', saveColors);

        document.getElementById('clearBtnColor').addEventListener('input', function(e) {
            document.getElementById('clearBtnText').value = e.target.value;
            updatePreviews();
        });
        document.getElementById('clearBtnColor').addEventListener('change', saveColors);

        document.getElementById('newGameBtnColor').addEventListener('input', function(e) {
            document.getElementById('newGameBtnText').value = e.target.value;
            updatePreviews();
        });
        document.getElementById('newGameBtnColor').addEventListener('change', saveColors);

        loadColors();
    </script>
</body>
</html>
